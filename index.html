<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visualizar Lanche em AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.container{
    text-align:center;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff6600;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#e65c00;
}

model-viewer{
    width:100%;
    height:100vh;
    display:none;
}
</style>
</head>
<body>

<div class="container" id="inicio">
    <h1>🍔 Cheeseburger AR</h1>
    <button onclick="abrirAR()">Ver Lanche</button>
</div>

<model-viewer
    id="arViewer"
    src="Cheeseburger.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    shadow-intensity="1"
    auto-rotate>
</model-viewer>

<script>
function abrirAR() {
    document.getElementById("inicio").style.display = "none";

    const viewer = document.getElementById("arViewer");
    viewer.style.display = "block";

    if (viewer.activateAR) {
        viewer.activateAR();
    }
}
</script>

</body>
</html>

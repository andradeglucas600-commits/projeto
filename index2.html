<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visualizador de Lanche</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:100%;
    max-width:900px;
    text-align:center;
}

h1{
    color:#333;
}

model-viewer{
    width:100%;
    height:600px;
    background:white;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}
</style>
</head>
<body>

<div class="container">
    <h1>🍔 Cheeseburger 3D</h1>

    <model-viewer
        src="Cheeseburger.glb"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
        environment-image="neutral">
    </model-viewer>
</div>

</body>
</html>
